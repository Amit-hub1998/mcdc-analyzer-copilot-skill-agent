<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <style>
    .title { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 20px; font-weight: 600; fill: #1a1a1a; }
    .section-label { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 12px; fill: #666; }
    .box-title { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; font-weight: 500; }
    .box-subtitle { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 11px; fill: #555; }
    .pattern-text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 11px; fill: #666; }
    
    .box-blue { fill: #E6F1FB; stroke: #185FA5; }
    .text-blue { fill: #0C447C; }
    .box-teal { fill: #E1F5EE; stroke: #0F6E56; }
    .text-teal { fill: #085041; }
    .box-purple { fill: #EEEDFE; stroke: #534AB7; }
    .text-purple { fill: #3C3489; }
    .box-amber { fill: #FAEEDA; stroke: #854F0B; }
    .text-amber { fill: #633806; }
    .box-coral { fill: #FAECE7; stroke: #993C1D; }
    .text-coral { fill: #712B13; }
    .box-gray { fill: #F1EFE8; stroke: #5F5E5A; }
    .text-gray { fill: #444441; }
    
    .section-box { fill: none; stroke: #B4B2A9; stroke-dasharray: 6 4; }
    .arrow { stroke: #888780; stroke-width: 1.5; fill: none; marker-end: url(#arrowhead); }
    .arrow-label { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 10px; fill: #888; }
  </style>
  
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M1 1L7 4L1 7" fill="none" stroke="#888780" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="600" fill="#FAFAF8"/>
  
  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" class="title">MCDC Analyzer — Skill Architecture</text>
  
  <!-- Section 1: Developer Workflow -->
  <rect x="40" y="55" width="720" height="90" rx="12" class="section-box"/>
  <text x="55" y="73" class="section-label">Developer Workflow</text>
  
  <rect x="60" y="85" width="140" height="45" rx="8" class="box-blue" stroke-width="1"/>
  <text x="130" y="113" text-anchor="middle" class="box-title text-blue">VS Code</text>
  
  <rect x="230" y="85" width="180" height="45" rx="8" class="box-blue" stroke-width="1"/>
  <text x="320" y="113" text-anchor="middle" class="box-title text-blue">GitHub Copilot Chat</text>
  
  <rect x="440" y="85" width="300" height="45" rx="8" class="box-gray" stroke-width="1"/>
  <text x="590" y="113" text-anchor="middle" class="box-subtitle text-gray">"Analyze my code for MCDC coverage"</text>
  
  <line x1="200" y1="107" x2="228" y2="107" class="arrow"/>
  <line x1="410" y1="107" x2="438" y2="107" class="arrow"/>
  
  <!-- Arrow down -->
  <line x1="400" y1="145" x2="400" y2="175" class="arrow"/>
  <text x="415" y="165" class="arrow-label">triggers</text>
  
  <!-- Section 2: Skill Loading -->
  <rect x="40" y="180" width="720" height="110" rx="12" class="section-box"/>
  <text x="55" y="198" class="section-label">Skill Discovery &amp; Loading</text>
  
  <rect x="60" y="215" width="200" height="60" rx="8" class="box-teal" stroke-width="1"/>
  <text x="160" y="240" text-anchor="middle" class="box-title text-teal">SKILL.md</text>
  <text x="160" y="258" text-anchor="middle" class="box-subtitle">Triggers &amp; instructions</text>
  
  <rect x="290" y="215" width="200" height="60" rx="8" class="box-purple" stroke-width="1"/>
  <text x="390" y="240" text-anchor="middle" class="box-title text-purple">analyze.py</text>
  <text x="390" y="258" text-anchor="middle" class="box-subtitle">AST parser script</text>
  
  <rect x="520" y="215" width="200" height="60" rx="8" class="box-amber" stroke-width="1"/>
  <text x="620" y="240" text-anchor="middle" class="box-title text-amber">.agent.md</text>
  <text x="620" y="258" text-anchor="middle" class="box-subtitle">Custom agent persona</text>
  
  <line x1="260" y1="245" x2="288" y2="245" class="arrow"/>
  <line x1="490" y1="245" x2="518" y2="245" class="arrow"/>
  
  <!-- Arrow down -->
  <line x1="390" y1="290" x2="390" y2="320" class="arrow"/>
  <text x="405" y="310" class="arrow-label">executes</text>
  
  <!-- Section 3: Analysis Engine -->
  <rect x="40" y="325" width="720" height="130" rx="12" class="section-box"/>
  <text x="55" y="343" class="section-label">Static Analysis Engine (No Code Execution)</text>
  
  <rect x="60" y="360" width="150" height="45" rx="8" class="box-teal" stroke-width="1"/>
  <text x="135" y="388" text-anchor="middle" class="box-title text-teal">AST Parser</text>
  
  <rect x="230" y="360" width="150" height="45" rx="8" class="box-teal" stroke-width="1"/>
  <text x="305" y="388" text-anchor="middle" class="box-title text-teal">Condition Extractor</text>
  
  <rect x="400" y="360" width="150" height="45" rx="8" class="box-purple" stroke-width="1"/>
  <text x="475" y="388" text-anchor="middle" class="box-title text-purple">MCDC Generator</text>
  
  <rect x="570" y="360" width="170" height="45" rx="8" class="box-coral" stroke-width="1"/>
  <text x="655" y="388" text-anchor="middle" class="box-title text-coral">Gap Detector</text>
  
  <line x1="210" y1="382" x2="228" y2="382" class="arrow"/>
  <line x1="380" y1="382" x2="398" y2="382" class="arrow"/>
  <line x1="550" y1="382" x2="568" y2="382" class="arrow"/>
  
  <text x="400" y="435" text-anchor="middle" class="pattern-text">Patterns: if/elif/else  •  .filter()  •  .where()  •  .when()/.otherwise()</text>
  
  <!-- Arrow down -->
  <line x1="400" y1="455" x2="400" y2="485" class="arrow"/>
  
  <!-- Section 4: Output -->
  <rect x="40" y="490" width="720" height="95" rx="12" class="section-box"/>
  <text x="55" y="508" class="section-label">Analysis Output</text>
  
  <rect x="60" y="525" width="210" height="50" rx="8" class="box-coral" stroke-width="1"/>
  <text x="165" y="548" text-anchor="middle" class="box-title text-coral">MCDC Test Cases</text>
  <text x="165" y="564" text-anchor="middle" class="box-subtitle">N+1 for N conditions</text>
  
  <rect x="290" y="525" width="210" height="50" rx="8" class="box-coral" stroke-width="1"/>
  <text x="395" y="548" text-anchor="middle" class="box-title text-coral">Logic Gaps</text>
  <text x="395" y="564" text-anchor="middle" class="box-subtitle">Missing branches</text>
  
  <rect x="520" y="525" width="210" height="50" rx="8" class="box-coral" stroke-width="1"/>
  <text x="625" y="548" text-anchor="middle" class="box-title text-coral">Negative Scenarios</text>
  <text x="625" y="564" text-anchor="middle" class="box-subtitle">NULL, boundary, edge cases</text>
  
</svg>
